services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - turnstone-traefik
    restart: unless-stopped

  traefik:
    image: traefik:v3.2
    command:
      - --providers.docker.endpoint=tcp://docker-socket-proxy:2375
    env_file:
      - ./traefik/.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/config/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/acme:/acme
    depends_on:
      - docker-socket-proxy
      - console
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-dashboard.rule=Host(`${TURNSTONE_TRAEFIK_DASHBOARD_HOST}`)
      - traefik.http.routers.traefik-dashboard.entrypoints=websecure
      - traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik-dashboard.middlewares=dashboard-auth@file
      - traefik.http.routers.traefik-dashboard.service=api@internal
    networks:
      - turnstone-net
      - turnstone-traefik
    restart: unless-stopped

  console:
    labels:
      - traefik.enable=true
      - traefik.http.routers.turnstone.rule=Host(`${TURNSTONE_TRAEFIK_APP_HOST}`)
      - traefik.http.routers.turnstone.entrypoints=websecure
      - traefik.http.routers.turnstone.tls.certresolver=letsencrypt
      - traefik.http.services.turnstone.loadbalancer.server.port=8090
    networks:
      - turnstone-net
      - turnstone-traefik

  caddy:
    profiles:
      - local-caddy

networks:
  turnstone-traefik:
    driver: bridge
    internal: true
